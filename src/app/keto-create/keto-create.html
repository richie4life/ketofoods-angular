<div class="container py-2">
    <div class="mb-3">
        <a class="btn btn-outline-secondary btn-sm rounded-pill px-3" [routerLink]="['']">
          &larr; Cancel
        </a>
    </div>

    <div class="keto-details-card">
        <h3 class="form-title mb-4">Create New Keto Food</h3>
        
        <form [formGroup]="newKetoForm">
            <div class="row">
                <!-- Title -->
                <div class="col-12 form-group mb-3">
                    <label for="title" class="form-label">Food Title</label>
                    <input id="title" class="form-control" formControlName="title" type="text" placeholder="e.g. Avocado Toast with Egg">
                </div>

                <!-- Calories & Fat -->
                <div class="col-md-6 form-group mb-3">
                    <label for="calories" class="form-label">Calories (kcal)</label>
                    <input id="calories" class="form-control" formControlName="calories" type="number" required>
                </div>

                <div class="col-md-6 form-group mb-3">
                    <label for="fat" class="form-label">Fat (g)</label>
                    <input id="fat" class="form-control" formControlName="fat" type="number" required>
                </div>

                <!-- Protein & Net Carbs -->
                <div class="col-md-6 form-group mb-3">
                    <label for="protein" class="form-label">Protein (g)</label>
                    <input id="protein" class="form-control" formControlName="protein" type="number" required>
                </div>

                <div class="col-md-6 form-group mb-3">
                    <label for="netCarbs" class="form-label">Net Carbs (g)</label>
                    <input id="netCarbs" class="form-control" formControlName="netCarbs" type="number" required>
                </div>

                <!-- Image Upload -->
                <div class="col-12 form-group mb-4">
                    <label for="image" class="form-label">Food Image Upload</label>
                    <input id="image" class="form-control" type="file" (change)="onFileSelected($event)">
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-2">
                <a class="btn btn-light px-4 rounded-pill border" [routerLink]="['']">Cancel</a>
                <button class="btn btn-custom-primary px-5 rounded-pill" (click)="createKeto()">Create Food</button>
            </div>
        </form>
    </div>
</div>
