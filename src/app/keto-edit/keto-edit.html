<div class="container py-2">
    <div class="mb-3">
        <a class="btn btn-outline-secondary btn-sm rounded-pill px-3" [routerLink]="['/keto', currentKeto().id]">
          &larr; Cancel
        </a>
    </div>

    <div class="keto-details-card">
        <h3 class="form-title mb-4">Edit Recipe</h3>
        
        <div class="row g-4 align-items-start">
            <!-- Left Side: Current Image -->
            @if (currentKeto().image && currentKeto().image !== 'null' && currentKeto().image !== '') {
                <div class="col-md-4">
                    <div class="edit-image-container">
                        <img class="edit-image" [src]="currentKeto().image" alt="Keto meal image">
                    </div>
                </div>
            }

            <!-- Right Side: Edit Form -->
            <div [class]="(currentKeto().image && currentKeto().image !== 'null' && currentKeto().image !== '') ? 'col-md-8' : 'col-12'">
                @if (ketoForm) {
                    <form [formGroup]="ketoForm">
                        <div class="row">
                            <!-- Title -->
                            <div class="col-12 form-group mb-3">
                                <label for="title" class="form-label">Food Title</label>
                                <input id="title" class="form-control" formControlName="title" type="text">
                            </div>

                            <!-- Calories & Fat -->
                            <div class="col-md-6 form-group mb-3">
                                <label for="calories" class="form-label">Calories (kcal)</label>
                                <input id="calories" class="form-control" formControlName="calories" type="number">
                            </div>

                            <div class="col-md-6 form-group mb-3">
                                <label for="fat" class="form-label">Fat (g)</label>
                                <input id="fat" class="form-control" formControlName="fat" type="number">
                            </div>

                            <!-- Protein & Net Carbs -->
                            <div class="col-md-6 form-group mb-3">
                                <label for="protein" class="form-label">Protein (g)</label>
                                <input id="protein" class="form-control" formControlName="protein" type="number">
                            </div>

                            <div class="col-md-6 form-group mb-3">
                                <label for="netCarbs" class="form-label">Net Carbs (g)</label>
                                <input id="netCarbs" class="form-control" formControlName="netCarbs" type="number">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a class="btn btn-light px-4 rounded-pill border" [routerLink]="['/keto', currentKeto().id]">Cancel</a>
                            <button class="btn btn-custom-primary px-5 rounded-pill" (click)="saveKeto()">Save Changes</button>
                        </div>
                    </form>
                } @else {
                    <div class="text-center py-5">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">Loading form...</span>
                        </div>
                    </div>
                }
            </div>
        </div>
    </div>
</div>
