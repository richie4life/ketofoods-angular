<div class="dashboard-header mb-4">
  <div class="row align-items-center justify-content-between">
    <div class="col-md-6">
      <h2 class="dashboard-title">Keto Dashboard</h2>
      <p class="dashboard-subtitle">Track your macros and manage your meal plans</p>
    </div>
    <div class="col-md-6 d-flex gap-3 justify-content-md-end align-items-center">
      <div class="search-container">
        <input 
          type="text" 
          class="form-control search-input" 
          placeholder="Search food by name..." 
          [value]="searchTerm()" 
          (input)="updateSearch($event)"
        >
      </div>
      <a class="btn btn-custom-primary" [routerLink]="['/keto/create']">
        Create Keto
      </a>
    </div>
  </div>
</div>

<div class="d-flex justify-content-between align-items-center mb-4">
  <span class="count-badge">
    Showing <strong>{{ filteredKetos().length }}</strong> of {{ ketos().length }} items
  </span>
</div>

<div class="food-grid-container">
  @for (keto of filteredKetos(); track keto.id) {
    <app-keto-overview [currentKeto]="keto" class="food-card-wrapper"></app-keto-overview>
  } @empty {
    <div class="empty-state text-center py-5">
      <div class="empty-state-icon">🥗</div>
      <h4 class="mt-3">No keto foods match your search</h4>
      <p class="text-muted">Try a different search term or add a new recipe.</p>
    </div>
  }
</div>
